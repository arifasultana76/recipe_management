{% extends 'master/base.html' %}

{% block body %}
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Recipe</title>

<style>
/* Scoped to recipe-add-form only */
.recipe-form-box {
  background: #fff;
  max-width: 550px;
  width: 100%;
  margin: 40px auto;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  font-family: "Segoe UI", Tahoma, sans-serif;
}

.recipe-form-box h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #333;
}

.recipe-form-box label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
  color: #444;
}

.recipe-form-box input[type=text],
.recipe-form-box input[type=file],
.recipe-form-box textarea,
.recipe-form-box select {
  width: 100%;
  padding: 12px;
  margin-bottom: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.recipe-form-box input[type=text]:focus,
.recipe-form-box input[type=file]:focus,
.recipe-form-box textarea:focus,
.recipe-form-box select:focus {
  border-color: #ff7e5f;
  box-shadow: 0 0 6px rgba(255, 126, 95, 0.5);
  outline: none;
}

.recipe-form-box textarea {
  resize: vertical;
  min-height: 100px;
}

.recipe-form-box input[type=submit] {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.recipe-form-box input[type=submit]:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.back-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #2196f3;
  color: #fff;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 500;
  transition: background 0.3s;
}

.back-btn:hover {
  background: #1976d2;
}
</style>
</head>

<body>

<div class="recipe-form-box">
  <h2>Add Recipe</h2>

  <form action="" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="title">Title</label>
    <input type="text" id="title" name="title" value={{recipie.title}} placeholder="Recipe title">

    <label for="description">Description</label>
    <textarea id="description" name="description" placeholder="Short description">{{recipie.description}}</textarea>

    <label for="ingredients">Ingredients</label>
    <input type="text" id="ingredients" name="ingredients" value={{recipie.ingredients}} placeholder="List ingredients">

    <label for="instructions">Instructions</label>
    <input type="text" id="instructions" name="instructions" value={{recipie.instructions}} placeholder="Cooking instructions">

    <label for="image">Recipe Image</label>
    <input type="file" id="image" name="image">
     {% if recipie.image %}
            <img src="{{ recipie.image.url }}" height="50px" class="recipe-img">
          {% else %}
            <span style="color:#777;">No Image</span>
          {% endif %}


    <label for="category">Category</label>
    <select id="category" name="category">
      <option value="">Select Category</option>
      {% for i in cate %}
        <option value="{{ i.id }}" {% if i.id == recipie.category.id %}selected{% endif %}>{{ i.name }}</option>
      {% endfor %}
    </select>

    <input type="submit" value="Add Recipe">
  </form>

  <a href="{% url 'recipie' %}" class="back-btn">Back to List</a>
</div>

</body>
</html>   
{% endblock body %}
